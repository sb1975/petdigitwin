steps:
  # Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/petdigitwin:$COMMIT_SHA', '.']

  # Push the container image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/petdigitwin:$COMMIT_SHA']

  # Deploy container image to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'petdigitwin'
      - '--image'
      - 'gcr.io/$PROJECT_ID/petdigitwin:$COMMIT_SHA'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--set-secrets=MONGODB_URI=MONGODB_URI:latest,GOOGLE_API_KEY=GOOGLE_API_KEY:latest,ATLAS_PUBLIC_KEY=ATLAS_PUBLIC_KEY:latest,ATLAS_PRIVATE_KEY=ATLAS_PRIVATE_KEY:latest,ATLAS_PROJECT_ID=ATLAS_PROJECT_ID:latest'
      - '--allow-unauthenticated'
images:
  - 'gcr.io/$PROJECT_ID/petdigitwin:$COMMIT_SHA'